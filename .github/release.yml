changelog:
  exclude:
    authors:
      - github-actions[bot]
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
    - title: Maintenance
      labels:
        - chore
        - ci
        - docs
        - refactor
